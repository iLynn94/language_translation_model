<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Detector | AI Powered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="background-glob"></div>

    <main class="container">
        <div class="card glass-effect">
            <header class="header">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m5 8 6 6" />
                        <path d="m4 14 6-6 2-3" />
                        <path d="M2 5h12" />
                        <path d="M7 2h1" />
                        <path d="m22 22-5-10-5 10" />
                        <path d="M14 18h6" />
                    </svg>
                </div>
                <h1>Language Detector</h1>
                <p class="subtitle">Enter text to identify the language instantly</p>
            </header>

            <div class="input-group">
                <label for="textInput" class="sr-only">Text to analyze</label>
                <textarea id="textInput" placeholder="Type or paste your text here..." rows="5"
                    spellcheck="false"></textarea>
                <div class="char-count">0 characters</div>
            </div>

            <button id="detectBtn" class="primary-btn">
                <span>Detect Language</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>

            <div id="resultArea" class="result-area hidden">
                <div class="result-label">Detected Language</div>
                <div id="detectedLanguage" class="result-value"></div>
                <!-- Confidence bar is visual only for now as backend doesn't return confidence score yet -->
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: 0%"></div>
                </div>
            </div>

            <footer class="footer">
                <p>AI Model v0.1.0 • Supports 17 Languages</p>
            </footer>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
